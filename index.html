<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SABA v3.3 - Monitor Blindado</title>
    <style>
        :root { --blue: #1a73e8; --red: #d93025; --green: #188038; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 15px; margin: 0; }
        .container { max-width: 950px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 6px solid var(--blue); }
        .toolbar { display: flex; gap: 10px; margin-bottom: 20px; background: #f1f3f4; padding: 10px; border-radius: 8px; border: 1px solid #ddd; }
        .grid-main { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: #fff; border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; color: #444; }
        textarea { width: 100%; height: 110px; border: 2px solid #ccc; border-radius: 5px; padding: 10px; box-sizing: border-box; font-family: monospace; resize: none; }
        
        .horarios-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .h-box { background: #f8f9fa; padding: 8px; border: 1px solid #ddd; border-radius: 6px; }
        .h-box.prioridade { background: #e8f0fe; border-color: var(--blue); }
        .h-box label { font-size: 11px; color: #5f6368; }
        .h-box.prioridade label { color: var(--blue); font-weight: bold; }
        input[type="text"] { width: 100%; padding: 8px; border: 1px solid #bdc1c6; border-radius: 4px; text-align: center; font-weight: bold; box-sizing: border-box; }
        .h-box.prioridade input[type="text"] { border-color: var(--blue); }

        button { cursor: pointer; border: none; border-radius: 5px; font-weight: bold; transition: 0.2s; }
        .btn-main { width: 100%; padding: 18px; background: var(--blue); color: white; font-size: 16px; margin-top: 10px; }
        .btn-sec { padding: 8px 15px; background: #444; color: white; font-size: 12px; }
        .btn-danger { background: var(--red); }
        button:hover { opacity: 0.9; }

        .output { margin-top: 25px; display: none; border-top: 2px dashed #ccc; padding-top: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: center; }
        th { background: #f8f9fa; color: #5f6368; font-size: 13px; }
